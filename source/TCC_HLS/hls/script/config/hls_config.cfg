# ============================================================================
# Vitis HLS配置文件 - TCC重构项目
# ============================================================================
# 参考：reference/vitis_hls_ftt的实现/interface_stream/hls_config.cfg
# 器件：xcku3p-ffvb676-2-e (Kintex UltraScale+)
# 时钟：5ns (200 MHz)
# ============================================================================

part=xcku3p-ffvb676-2-e

[hls]
clock=5ns
flow_target=vivado

# 源文件列表（绝对路径）
syn.file=/root/project/FPGA-Litho/source/TCC_HLS/hls/src/data_types.h
syn.file=/root/project/FPGA-Litho/source/TCC_HLS/hls/src/calc_tcc.cpp
syn.file=/root/project/FPGA-Litho/source/TCC_HLS/hls/src/calc_tcc.h

# 顶层函数（Phase 1暂用calc_tcc作为顶层测试）
syn.top=calc_tcc

# 测试平台文件
tb.file=/root/project/FPGA-Litho/source/TCC_HLS/hls/tb/tb_calc_tcc.cpp
tb.file=/root/project/FPGA-Litho/source/TCC_HLS/hls/golden

# C仿真验证
csim.flags=-std=c++11

# CoSim验证（Phase 5启用）
cosim.flags=-trace_level all

# IP导出
package.output.format=rtl
package.output.archive=zip