# ============================================================================
# Vitis HLS配置文件 - TCC重构项目
# ============================================================================
# 参考：reference/vitis_hls_ftt的实现/interface_stream/hls_config.cfg
# 器件：xcku3p-ffvb676-2-e (Kintex UltraScale+)
# 时钟：5ns (200 MHz)
# ============================================================================

part = xcku3p-ffvb676-2-e

[hls]
clock = 5ns
flow_target = vivado

# ============================================================================
# 源文件列表（Phase 1时补充calc_tcc.cpp等）
# ============================================================================
syn.file = src/data_types.h
syn.file = src/tcc_top.cpp      # Phase 4添加
syn.file = src/calc_tcc.cpp     # Phase 1添加
syn.file = src/calc_image.cpp   # Phase 3添加
syn.file = src/fft_2d.cpp       # Phase 2添加

# 顶层函数
syn.top = tcc_top               # Phase 4定义

# ============================================================================
# 测试平台文件
# ============================================================================
tb.file = tb/tb_tcc.cpp
tb.file = tb/golden             # 包含golden数据目录

# ============================================================================
# 仿真配置
# ============================================================================
# C仿真：验证算法正确性（对比golden数据）
csim.flags = -std=c++11

# CoSim：RTL级验证
cosim.flags = -trace_level all

# ============================================================================
# IP导出配置
# ============================================================================
package.output.format = rtl
package.output.archive = zip

# ============================================================================
# 综合优化选项（Phase 1时启用）
# ============================================================================
# 循环流水线化
syn.pipeline = true

# 数据流优化
syn.dataflow = true

# 数组分区策略
syn.partition = cyclic,4