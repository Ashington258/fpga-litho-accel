# ============================================================================
# SOCS 2048 Architecture HLS Config
# FPGA-Litho Project
# 
# Target: xcku3p-ffvb676-2-e
# Clock: 250 MHz
# ============================================================================

[connectivity]
# Kernel definition
kernel=calc_socs_2048_hls:calc_socs_2048_hls

# Clock configuration
clock=calc_socs_2048_hls:250MHz

[project]
# Target FPGA part
part=xcku3p-ffvb676-2-e

# Board support (optional)
# board=xilinx.com:kcu1500:part0:xilinx_kcu1500_dynamic

# Flow target: Vivado IP or Vitis kernel
flow_target=vivado

# ============================================================================
# Source Files
# ============================================================================
# Main kernel source
src=src/socs_2048.cpp

# HLS FFT IP configuration
src=src/hls_fft_config_2048_corrected.h

# Test bench (golden_1024 validation with OUTPUT_MODE=1)
tb=tb/tb_socs_1024.cpp

# ============================================================================
# Compilation Flags
# ============================================================================
# DDR cache mode (comment out for BRAM-only C simulation)
# cflags=-DUSE_DDR_CACHE

# Default: BRAM-only mode for C simulation
cflags=

# ============================================================================
# Synthesis Configuration
# ============================================================================

# Synthesis timeout (seconds)
synth_timeout=600

# Simulation timeout (seconds)
sim_timeout=300

# Output directory
work_dir=socs_2048_synth

# ============================================================================
# HLS Optimization Settings
# ============================================================================

# Loop optimization: enable loop flattening and pipelining
hls_loops_opt=true

# Pipeline optimization: aggressive pipelining for high throughput
hls_pipeline_ii=1

# Memory optimization: enable array partitioning
hls_array_partition=true

# Burst optimization: enable AXI burst transactions
hls_burst_opt=true

# ============================================================================
# Resource Constraints (Target for 2048 Architecture)
# ============================================================================
# Expected resource usage:
#   - BRAM: ~200 (reduced from 1105% original)
#   - DSP:  ~400 (FFT optimization)
#   - LUT:  ~80000
#   - FF:   ~100000

# BRAM constraint
bram_limit=300

# DSP constraint
dsp_limit=500

# LUT constraint (no hard limit for initial synthesis)
# lut_limit=100000

# ============================================================================
# FFT Configuration (Future Integration)
# ============================================================================
# Note: Current version uses direct DFT
# Future: integrate HLS FFT IP

# FFT IP parameters (planned)
# fft.impl=primitives
# fft.radix=2
# fft.max_length=128
# fft.complex_mult_type=use_luts

# ============================================================================
# Build Steps
# ============================================================================
# Step order: csim → csynth → cosim → package

# Enable C simulation
csim=true

# Enable C synthesis
csynth=true

# Enable Co-simulation
cosim=false

# Enable package
package=false

# ============================================================================
# Debug Options
# ============================================================================
# Enable debug logging
debug=true

# Enable trace output
trace=true

# Generate RTL simulation
rtl_sim=true

# ============================================================================
# Output Format
# ============================================================================
# Package format: Vivado IP catalog
package.output.format=rtl

# Output IP name
package.ip_name=socs_2048_ip

# Output IP version
package.ip_version=1.0.0