# ==============================================================================
# Vitis HLS Configuration for Optimized SOCS IP (FFT IP Integration)
# FPGA-Litho Project - xcku3p-ffvb676-2-e
# ==============================================================================

part=xcku3p-ffvb676-2-e

[hls]
clock=5ns
flow_target=vivado

# Source files
syn.file=../../src/socs_optimized.cpp
syn.file=../../src/socs_config_optimized.h
syn.top=calc_socs_optimized_hls

# Testbench
tb.file=../../tb/tb_socs_optimized.cpp

# Compiler flags
csim.flags=-std=c++11

# Pipeline optimization
hls.pipeline_ii=1

# Array partitioning for FFT arrays
hls.array_partition=cyclic factor=2 dim=2 variable=temp1
hls.array_partition=cyclic factor=2 dim=2 variable=temp2
hls.array_partition=cyclic factor=2 dim=2 variable=temp3

# Resource specification (use BRAM for intermediate buffers)
hls.resource=RAM_2P_BRAM variable=temp1
hls.resource=RAM_2P_BRAM variable=temp2
hls.resource=RAM_2P_BRAM variable=temp3

# Interface specification
hls.interface=m_axi port=mskf_r bundle=gmem0 latency=32
hls.interface=m_axi port=mskf_i bundle=gmem1 latency=32
hls.interface=m_axi port=scales bundle=gmem2 latency=16
hls.interface=m_axi port=krn_r bundle=gmem3 latency=16
hls.interface=m_axi port=krn_i bundle=gmem4 latency=16
hls.interface=m_axi port=output_full bundle=gmem5 latency=8
hls.interface=m_axi port=output_center bundle=gmem6 latency=8
hls.interface=s_axilite port=return bundle=control