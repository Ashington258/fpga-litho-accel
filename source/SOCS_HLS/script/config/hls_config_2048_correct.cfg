# ============================================================================
# SOCS 2048 Architecture HLS Config (Correct Format)
# FPGA-Litho Project
# 
# Target: xcku3p-ffvb676-2-e
# Clock: 250 MHz (4ns)
# ============================================================================

part=xcku3p-ffvb676-2-e

[hls]
clock=4ns
flow_target=vivado
package.output.format=rtl

# Main kernel source (relative to script/config/../.. = SOCS_HLS root)
syn.file=../../src/socs_2048.cpp
syn.file=../../src/socs_2048.h

# Ping-Pong buffer implementation
syn.file=../../src/socs_2048_pingpong.cpp

# Top function
syn.top=calc_socs_2048_hls

# Test bench
tb.file=../../tb/tb_socs_2048.cpp

# C simulation flags
csim.flags=-std=c++17

# Synthesis timeout
synth_timeout=600

# Simulation timeout
sim_timeout=300