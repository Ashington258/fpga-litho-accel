# SOCS 2048 Architecture - golden_1024 Validation (OUTPUT_MODE=1)
# FPGA-Litho Project
# Generates full 128×128 tmpImgp for Fourier Interpolation validation

# ============================================================================
# Device Configuration
# ============================================================================

part = xcku3p-ffvb676-2-e

# ============================================================================
# HLS Settings
# ============================================================================

[hls]
clock = 5ns
flow_target = vivado

# ============================================================================
# Source Files (128×128 Architecture)
# ============================================================================

# Main kernel (socs_2048.cpp - MAX_FFT_X=128)
syn.file = ../../src/socs_2048.h
syn.file = ../../src/socs_2048.cpp
syn.file = ../../src/hls_fft_config_2048_corrected.h

# Top-level function
syn.top = calc_socs_2048_hls

# ============================================================================
# Test Bench (OUTPUT_MODE=1 for full 128×128 output)
# ============================================================================

tb.file = ../../tb/tb_socs_1024.cpp

# ============================================================================
# Compilation Flags
# ============================================================================

syn.compile.name_max_length = 256
syn.interface.clock_enable = 0