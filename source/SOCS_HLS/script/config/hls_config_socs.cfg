# SOCS核心算法HLS配置（简化版本）
# FPGA-Litho Project

# ============================================================================
# 器件设置
# ============================================================================

part = xcku3p-ffvb676-2-e

# ============================================================================
# HLS设置
# ============================================================================

[hls]
clock = 5ns
flow_target = vivado
package.output.format = ip_catalog

# ============================================================================
# 源文件（无FFT库简化版本）
# ============================================================================

# 核心源文件（不包含FFT头文件，避免CoSim冲突）
syn.file = ../../src/socs_simple_nofft.cpp

# 顶层函数
syn.top = calc_socs_simple_hls

# ============================================================================
# 测试平台
# ============================================================================

sim.file = ../../tb/tb_socs_nofft.cpp

# ============================================================================
# 编译选项
# ============================================================================

csim.flags = -DALLOW_EMPTY_HLS_STREAM_READS