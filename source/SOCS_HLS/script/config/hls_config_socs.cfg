# SOCS核心算法HLS配置（简化版本）
# FPGA-Litho Project

# ============================================================================
# 器件设置
# ============================================================================

part = xcku3p-ffvb676-2-e

# ============================================================================
# HLS设置
# ============================================================================

[hls]
clock = 5ns
flow_target = vivado
package.output.format = rtl

# ============================================================================
# 源文件（简化版本，避免接口复杂性）
# ============================================================================

# 核心源文件
syn.file = ../../src/data_types.h
syn.file = ../../src/fft_2d.h
syn.file = ../../src/calc_socs_simple.cpp

# 顶层函数（简化版本）
syn.top = calc_socs_simple_hls

# ============================================================================
# 编译选项
# ============================================================================

csim.flags = -DALLOW_EMPTY_HLS_STREAM_READS