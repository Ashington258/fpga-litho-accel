# ============================================================================
# SOCS 2048 Architecture - C Synthesis (BRAM-only Baseline)
# FPGA-Litho Project
# 
# Purpose: First C Synthesis run to establish baseline resource metrics
# Path: BRAM-only (no USE_DDR_CACHE) - same as C Simulation
# Target: xcku3p-ffvb676-2-e
# ============================================================================

part = xcku3p-ffvb676-2-e

[hls]
clock = 5ns
flow_target = vivado

# ============================================================================
# Source Files
# ============================================================================

# Main kernel header
syn.file = ../../src/socs_2048.h
# Main kernel implementation
syn.file = ../../src/socs_2048.cpp
# HLS FFT IP configuration (included but BRAM-only path used for now)
syn.file = ../../src/hls_fft_config_2048_corrected.h

# Top-level function
syn.top = calc_socs_2048_hls

# ============================================================================
# Test Bench (needed for compilation but not executed during synthesis)
# ============================================================================

tb.file = ../../tb/tb_socs_1024.cpp

# ============================================================================
# Compilation Flags
# ============================================================================

syn.compile.name_max_length = 256
syn.interface.clock_enable = 0

# ============================================================================
# Synthesis Settings
# ============================================================================

# Synthesis timeout (minutes) - 128x128 FFT may take longer
synth_timeout = 120

# ============================================================================
# Co-Simulation Settings
# ============================================================================

# Use default XSIM simulator (VCS not available)
